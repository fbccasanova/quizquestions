<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flourish Quiz - True or False</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #05472A; /* Matching your previous theme */
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .quiz-card {
            background-color: #1a2a6c; /* Navy Blue */
            padding: 40px;
            border-radius: 24px;
            box-shadow: 12px 12px 0px #c1ff72; /* Electric Lime */
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 4px solid #4a4a4a;
        }

        h1 {
            color: #c1ff72;
            font-size: 32px;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .question-container {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .question {
            color: #ffffff;
            font-size: 22px;
            margin-bottom: 35px;
            line-height: 1.5;
            font-weight: 400;
        }

        .options {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            background-color: #c1ff72;
            color: #1a2a6c;
            border: none;
            padding: 18px 35px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0px 4px 0px #4a4a4a;
            min-width: 140px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0px 7px 0px #4a4a4a;
            background-color: #ffffff;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0px 2px 0px #4a4a4a;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0px 4px 0px #4a4a4a;
        }

        #feedback {
            margin-top: 30px;
            font-size: 22px;
            font-weight: 800;
            min-height: 33px;
            text-transform: uppercase;
        }

        .correct { color: #c1ff72; }
        .wrong { color: #ff0503; }

        /* Verification Styling */
        .verification {
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            max-width: 600px;
            font-size: 13px;
            color: #e0e0e0;
            font-family: sans-serif;
            line-height: 1.4;
        }
        .verification h2 { font-size: 16px; margin-top: 0; color: #c1ff72; }
    </style>
</head>
<body>

    <div class="quiz-card">
        <h1>TRUE OR FALSE</h1>
        <div class="question-container">
            <div id="question-text" class="question">Loading...</div>
        </div>
        
        <div class="options">
            <button class="btn choice-btn" onclick="handleUserChoice(true)">TRUE</button>
            <button class="btn choice-btn" onclick="handleUserChoice(false)">FALSE</button>
        </div>

        <div id="feedback"></div>
    </div>

    <div class="verification">
        <h2>Fact Check & Sources</h2>
        <div id="fact-source">
            Choose an answer to see the nutritional science behind the question.
        </div>
    </div>

    <script>
        // Verified database of health and nutrition facts
        const quizData = [
            {
                q: "Fresh vegetables are always healthier than frozen vegetables.",
                a: false,
                fact: "Frozen vegetables are flash-frozen at peak ripeness, locking in vitamins. Fresh produce can lose nutrients during long transport times.",
                source: "Source: Mayo Clinic / Healthline"
            },
            {
                q: "Drinking water helps boost your metabolism.",
                a: true,
                fact: "Drinking water can temporarily increase the amount of calories you burn, known as resting energy expenditure.",
                source: "Source: Journal of Clinical Endocrinology and Metabolism"
            },
            {
                q: "Brown sugar is significantly healthier than white sugar.",
                a: false,
                fact: "Brown sugar is just white sugar with molasses added. The nutritional difference is negligible; both affect blood sugar similarly.",
                source: "Source: American Heart Association"
            },
            {
                q: "Eggs increase your risk of heart disease due to high cholesterol.",
                a: false,
                fact: "For most people, dietary cholesterol in eggs has a small effect on blood cholesterol levels compared to trans fats and saturated fats.",
                source: "Source: Harvard T.H. Chan School of Public Health"
            },
            {
                q: "Carrots significantly improve night vision.",
                a: false,
                fact: "While Vitamin A in carrots is vital for eye health, eating extra won't give you 'super' night vision unless you had a deficiency.",
                source: "Source: Scientific American"
            },
            {
                q: "Standard table salt and sea salt contain the same amount of sodium.",
                a: true,
                fact: "By weight, both contain about 40% sodium. Sea salt is often less processed but isn't 'low sodium'.",
                source: "Source: American Heart Association"
            }
        ];

        let currentQuestion = null;

        function loadRandomQuestion() {
            const randomIndex = Math.floor(Math.random() * quizData.length);
            currentQuestion = quizData[randomIndex];
            document.getElementById('question-text').textContent = currentQuestion.q;
        }

        function handleUserChoice(userChoice) {
            const feedback = document.getElementById('feedback');
            const factSource = document.getElementById('fact-source');
            const buttons = document.querySelectorAll('.choice-btn');

            // Disable buttons after answer
            buttons.forEach(btn => btn.disabled = true);

            if (userChoice === currentQuestion.a) {
                feedback.innerHTML = "✓ CORRECT! move 1 space!";
                feedback.className = "correct";
            } else {
                feedback.innerHTML = "✗ WRONG! next time!";
                feedback.className = "wrong";
            }

            factSource.innerHTML = `<strong>The Science:</strong> ${currentQuestion.fact}<br><br><small>${currentQuestion.source}</small>`;
        }

        // Initialize with a random question on page load
        window.onload = loadRandomQuestion;
    </script>
</body>
</html>
