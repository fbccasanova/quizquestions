<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flourish Quiz - True or False</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #05472A;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: white;
        }

        .quiz-card {
            background-color: #1a2a6c; /* Navy Blue */
            padding: 30px;
            border-radius: 24px;
            box-shadow: 10px 10px 0px #c1ff72; /* Electric Lime */
            text-align: center;
            max-width: 450px;
            width: 100%;
            border: 4px solid #4a4a4a;
        }

        h1 { color: #c1ff72; font-size: 28px; margin-bottom: 20px; letter-spacing: 2px; }

        .question-container { min-height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; }
        .question { font-size: 20px; line-height: 1.4; font-weight: 400; }

        .options { display: flex; gap: 15px; justify-content: center; }

        .btn {
            background-color: #c1ff72;
            color: #1a2a6c;
            border: none;
            padding: 15px 30px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0px 4px 0px #4a4a4a;
            flex: 1;
        }

        .btn:active { transform: translateY(2px); box-shadow: 0px 2px 0px #4a4a4a; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #feedback { margin-top: 25px; font-size: 20px; font-weight: 800; text-transform: uppercase; min-height: 30px; }
        .correct { color: #c1ff72; }
        .wrong { color: #ff0503; }

        .verification {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            max-width: 450px;
            font-size: 13px;
            border-left: 5px solid #c1ff72;
        }
        .verification h2 { font-size: 16px; margin: 0 0 10px 0; color: #c1ff72; }
    </style>
</head>
<body>

    <div class="quiz-card">
        <h1>TRUE OR FALSE</h1>
        <div class="question-container">
            <div id="question-text" class="question">Loading...</div>
        </div>
        
        <div class="options">
            <button class="btn choice-btn" onclick="handleUserChoice(true)">TRUE</button>
            <button class="btn choice-btn" onclick="handleUserChoice(false)">FALSE</button>
        </div>

        <div id="feedback"></div>
    </div>

    <div class="verification">
        <h2>Fact Check & Sources</h2>
        <div id="fact-source">
            Answer the question to unlock the nutritional science behind it!
        </div>
    </div>

    <script>
        const quizData = [
            { q: "Fresh vegetables are always healthier than frozen vegetables.", a: false, fact: "Frozen veggies are flash-frozen at peak ripeness, locking in vitamins.", source: "Source: NIH:Why frozen fruit and veggies may be better for you than fresh" },
            { q: "Drinking water helps boost your metabolism.", a: true, fact: "Water intake temporarily increases calories burned via thermogenesis.", source: "Source: Healthline" },
            { q: "Brown sugar is significantly healthier than white sugar.", a: false, fact: "Brown sugar is white sugar with molasses; nutritional difference is tiny.", source: "Source: AHA" },
            { q: "Standard table salt and sea salt contain the same amount of sodium.", a: true, fact: "By weight, both are about 40% sodium.", source: "Source: American Heart Association" },
            { q: "Eggs increase your risk of heart disease due to cholesterol.", a: false, fact: "Dietary cholesterol has minimal impact on blood cholesterol for most people.", source: "Source: Harvard Health" },
            { q: "Carrots significantly improve night vision.", a: false, fact: "Vitamin A helps eyes, but extra carrots won't give you 'super' vision.", source: "Source: Scientific American" },
            { q: "Celery has 'negative calories'.", a: false, fact: "While very low in calories, the energy to digest it is less than the celery provides.", source: "Source: BBC Good Food" },
            { q: "Multigrain bread is always the same as whole wheat bread.", a: false, fact: "Multigrain just means 'many grains'; it may still be refined white flour.", source: "Source: WebMD" },
            { q: "The FDA strictly regulates the word NATURAL to mean a product is healthy.", a: false, fact: "The term NATURAL usually just means no artificial colors were added; it does not guarantee a product is low-calorie or healthy.", source: "SFDA - Use of the Term Natural" },
            { q: "Natural sugar in fruit is different than added white sugar.", a: true, fact: "Fruit contains fiber which slows sugar absorption and prevents spikes.", source: "Source: Healthline" },
            { q: "Detox teas and juices are necessary to cleanse the body.", a: false, fact: "Your liver and kidneys perform all the 'detoxing' your body needs.", source: "Source: NIH" },
            { q: "Gluten-free diets are healthier for everyone.", a: false, fact: "Unless you have Celiac disease or sensitivity, gluten-free is not inherently 'healthier'.", source: "Source: Johns Hopkins Medicine" },
            { q: "Fruit juice is as healthy as eating whole fruit.", a: false, fact: "Juicing removes the fiber, leading to much faster blood sugar spikes.", source: "Source: Nutrition.org" },
            { q: "White meat is always healthier than dark meat.", a: false, fact: "Dark meat contains more iron and zinc; the calorie difference is small.", source: "Source: USDA" },
            { q: "Dark chocolate contains antioxidants that can benefit heart health.", a: true, fact: "Flavanols in dark chocolate (at least 70% cocoa) can help relax blood vessels and improve blood flow.", source: "Source:Johns Hopkins Medicine - The Benefits of Having a Healthy Relationship with Chocolate" }
        ];

        let currentQuestion = null;

        function initQuiz() {
            // Shuffle the entire array so the play order is different every time
            const shuffled = quizData.sort(() => 0.5 - Math.random());
            currentQuestion = shuffled[0];
            document.getElementById('question-text').textContent = currentQuestion.q;
        }

        function handleUserChoice(userChoice) {
            const feedback = document.getElementById('feedback');
            const factSource = document.getElementById('fact-source');
            const buttons = document.querySelectorAll('.choice-btn');

            buttons.forEach(btn => btn.disabled = true);

            if (userChoice === currentQuestion.a) {
                feedback.innerHTML = "✓ CORRECT!";
                feedback.className = "correct";
            } else {
                feedback.innerHTML = "✗ WRONG!";
                feedback.className = "wrong";
            }

            factSource.innerHTML = `<strong>The Science:</strong> ${currentQuestion.fact}<br><br><small>${currentQuestion.source}</small>`;
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
